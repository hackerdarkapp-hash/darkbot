services:
  - type: web
    name: nexusai-darkbot
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://nexusai-darkbot.onrender.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
